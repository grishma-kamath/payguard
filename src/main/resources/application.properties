spring.application.name=payguard
# Disable JPA auto-configuration temporarily
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Security: suppress stack traces and internal details in error responses
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Default credentials (override via environment variables in production)
spring.security.user.name=${PAYGUARD_USER:admin}
spring.security.user.password=${PAYGUARD_PASSWORD:changeme}
